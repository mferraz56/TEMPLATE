services:
  app:
    build: .
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - ${ENV_FILE:-.env.example}
    environment:
      RUN_MIGRATIONS: "1"
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_INTERNAL_PORT: ${POSTGRES_INTERNAL_PORT:-5432}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 5s
    networks:
      - template_internal

  worker:
    build: .
    command: python -m celery -A src.app.celery_app.celery_app worker --loglevel=info --concurrency=1
    env_file:
      - ${ENV_FILE:-.env.example}
    environment:
      RUN_MIGRATIONS: "0"
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_INTERNAL_PORT: ${POSTGRES_INTERNAL_PORT:-5432}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -v grep | grep 'celery' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - template_internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - template_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-template_db}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:${POSTGRES_INTERNAL_PORT:-5432}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - template_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-template_db} -p ${POSTGRES_INTERNAL_PORT:-5432} || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:

networks:
  template_internal:
    driver: bridge
